services:
  backend:
    build:
      context: ./backend
    ports:
      - "25:25"
      - "3000:3000"
    volumes:
      - mail_data:/data
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mail_data:
    driver: local
